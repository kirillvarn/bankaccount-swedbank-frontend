<div *ngIf="account() as account" class="account-container">
    <div>
        <button navigateBack class="primary">
            < Back
        </button>
    </div>

    <div class="account-header" style="margin-bottom: 16px;">
        <h1> {{ account.name }} </h1>
        <div class="flex flex-column">
            <h1 class="color-primary" style="margin-bottom: 0;"> {{ getDisplayBalance(account) }} </h1>
            <span class="text-muted"> Available balance</span>
        </div>
    </div>

    <div *ngIf="chartData() as chartData" style="margin-bottom: 12px;">
        <div *ngIf="chartData.length > 0" class="card" style="height: 400px;">
            <app-line-chart [chartData]="chartData"/>
        </div>
    </div>

    <div *ngIf="transactions() as transactions" class="transactions-details card">
        <div class="card-header">
            <h3>Transaction history</h3>
        </div>

        <app-table [data]="transactions"
            [columns]="['transactionType', 'amount', 'balanceBefore', 'balanceAfter']" [showDetails]="true"/>

    </div>
</div>
