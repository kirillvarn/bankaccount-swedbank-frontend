<div style="margin-bottom: 12px;">
    <button navigateBack class="primary">
        < Back
    </button>
</div>

<div *ngIf="transaction() as transaction" class="card">
    <div class="card-header flex" style="align-items: center; justify-content: space-between;">
        <h2 class="color-primary"> Transaction overview </h2>
        <button (click)="generateReport()"> Generate report </button>
    </div>
    <hr>
    <div class="card-body">
        <div> Amount: {{ transaction.amount }} </div>
        <div> Transaction type: {{ transaction.transactionType }} </div>
        <div> Balance before: {{ transaction.balanceBefore }} </div>
        <div> Balance after: {{ transaction.balanceAfter }} </div>
    </div>
</div>
